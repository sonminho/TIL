{% load bootstrap4 %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  {% bootstrap_css %}
  <script src="https://kit.fontawesome.com/fe63f66816.js"></script>
  <title>Document</title>
</head>
<body>
  <div class="container">
    {% if user.is_authenticated %}
      <h3>hello {{user.username}}</h3>
      <a href="{% url 'accounts:update' %}">회원수정</a>
      <a href="{% url 'accounts:change_password' %}">비번변경</a>
      <a href="{% url 'accounts:logout' %}">로그아웃</a>
      <form action="{% url 'accounts:delete' %}" method="post" style="display:inline">
        {% csrf_token %}
        <input class="btn btn-danger" type="submit" value="회원탈퇴">
      </form>

    {% else %}
      <a href="{% url 'accounts:login' %}">로그인</a>
      <a href="{% url 'accounts:signup' %}">회원가입</a>
    {% endif %}

    {% block content %}
    {% endblock %}
  </div>
  {% bootstrap_javascript jquery='full' %}
</body>
</html>
