{% extends "boards/base.html" %}

{% block content %}
    <div class="jumbotron mt-5">
        <h4>{{board.id}}번 게시글 수정</h4><br>
        <form class="form" action="" method="POST">
            {% csrf_token %}
            <input class="form-control mt-5" type="text" name="title" value="{{board.title}}" placeholder="글제목">
            <textarea class="form-control mt-5" rows="5" name="content" placeholder="글내용">{{board.content}}</textarea>
            <div class="d-flex flex-row-reverse mt-5">
                <button class="btn btn-primary ml-3" type="submit">수정</button>
                <button class="btn btn-danger" type="button">취소</button>
            </div>
        </form>
        <a href="{% url 'boards:index' %}">뒤로가기</a>
    </div>
{% endblock %}
