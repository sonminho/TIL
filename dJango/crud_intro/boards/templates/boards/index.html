{% extends 'boards/base.html' %}

{% block content %}
    <h2>게시글 리스트</h2>
    <table class="table table-striped mt-5">
        <thead class="thead-dark">
            <tr>
                <th>글 번호</th>
                <th>글 내용</th>
                <th>등록일</th>
                <th>수정일</th>
            </tr>
        </thead>
        <tbody>
            {% for board in boards %}
                <tr>
                    <td>{{board.title}}</td>
                    <td>{{board.content}}</td>
                    <td>{{board.created_at}}</td>
                    <td>{{board.updated_at}}</td>
                </tr>
            {% endfor %}
        </tbody>
    </table>

    <div class="row mt-5">
        <p><a href="/boards/new/">글작성</a></p>
    </div>
{% endblock %}
